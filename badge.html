<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DripDesk — Badge Generator</title>
<style>
:root{
  --bg:#0f0f10;--surface:#18181b;--surface2:#1f1f23;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8e8e6;--muted:#888885;
  --accent:#e8d5a3;--accent2:#c4a96b;
  --red:#e05c5c;--green:#5cb87a;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
header{padding:1.25rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.logo{font-family:ui-monospace,'Cascadia Code','Consolas',monospace;font-size:18px;font-weight:600;color:var(--accent);}
.logo-sep{color:var(--border2);}
.logo-sub{font-size:13px;color:var(--muted);}
main{flex:1;display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100vh - 57px);}
.panel{padding:1.5rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;}
.preview{position:relative;background:var(--surface);display:flex;align-items:center;justify-content:center;}
canvas{display:block;}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:var(--muted);}
.field input[type=text]{
  height:40px;padding:0 12px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);
  font-size:18px;font-family:ui-monospace,'Cascadia Code',monospace;
  font-weight:600;letter-spacing:2px;text-transform:uppercase;
  outline:none;transition:border-color 0.12s;
}
.field input[type=text]:focus{border-color:var(--accent2);}
.field input[type=number]{
  height:36px;padding:0 10px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);font-size:13px;
  outline:none;width:100%;
}
.layer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.layer-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;
}
.layer-card .layer-title{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:600;margin-bottom:8px;
}
.layer-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
.layer-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.layer-row label{font-size:11px;color:var(--muted);}
.layer-row input{width:60px;}
.btn{
  height:40px;padding:0 16px;border-radius:var(--radius);
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.12s,border-color 0.12s;font-family:inherit;
}
.btn:hover{background:var(--surface);border-color:rgba(255,255,255,0.2);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#111;font-weight:600;}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-group{display:flex;gap:8px;}
.status{font-size:11px;color:var(--muted);text-align:center;padding:8px;}
.status.err{color:var(--red);}
.status.ok{color:var(--green);}
.warning{
  background:rgba(232,169,58,0.1);border:1px solid rgba(232,169,58,0.3);
  border-radius:var(--radius);padding:8px 10px;
  font-size:11px;color:#e8a93a;line-height:1.5;display:none;
}
.preview-label{
  position:absolute;bottom:12px;left:12px;
  font-size:11px;color:var(--muted);
  background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:4px;
}
.hole-warning{
  display:flex;align-items:center;gap:6px;
  background:rgba(232,169,58,0.08);border:1px solid rgba(232,169,58,0.2);
  border-radius:var(--radius);padding:8px 10px;font-size:11px;color:#e8a93a;
}
.hole-warning i{font-size:14px;}

.accordion{border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.accordion-btn{
  width:100%;padding:10px 12px;background:var(--surface2);border:none;
  color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 0.12s;
}
.accordion-btn:hover{background:var(--surface);}
.accordion-body{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.layer-colour-row{display:flex;align-items:center;gap:10px;}
.layer-colour-label{font-size:12px;color:var(--muted);width:56px;flex-shrink:0;}
.colour-picker-wrap{position:relative;flex:1;}
.colour-picker-btn{
  display:flex;align-items:center;gap:8px;
  height:32px;padding:0 10px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text);
  transition:border-color 0.12s;
}
.colour-picker-btn:hover{border-color:rgba(255,255,255,0.25);}
.cp-swatch{width:16px;height:16px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);}
.cp-label{flex:1;}
.cp-arrow{font-size:11px;color:var(--muted);}
.colour-picker-list{
  position:fixed;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);z-index:9999;
  max-height:200px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:4px 0;min-width:180px;
}
.cp-option{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;cursor:pointer;font-size:12px;
  transition:background 0.1s;
}
.cp-option:hover{background:var(--surface2);}
.layer-setting-row{display:flex;align-items:center;justify-content:space-between;}
.layer-setting-row label{font-size:11px;color:var(--muted);}
.layer-setting-row input{width:56px;height:26px;padding:0 6px;font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<header>
  <span class="logo">DripDesk</span>
  <span class="logo-sep">/</span>
  <span class="logo-sub">Badge Generator</span>
</header>

<main>
  <!-- Control Panel -->
  <div class="panel">

    <!-- Name -->
    <div>
      <div class="section-title">Name</div>
      <input type="text" id="nameInput" value="WADE" maxlength="20" placeholder="Enter name…"
        style="height:40px;padding:0 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:18px;font-family:ui-monospace,monospace;font-weight:600;letter-spacing:2px;text-transform:uppercase;outline:none;width:100%"
        oninput="onNameChange()">
    </div>

    <!-- Layer colours -->
    <div>
      <div class="section-title">Layer Colours</div>
      <div style="display:flex;flex-direction:column;gap:8px" id="layerColoursList"></div>
    </div>

    <!-- Advanced accordion -->
    <div class="accordion">
      <button class="accordion-btn" onclick="toggleAccordion()">
        <span>Advanced</span>
        <i class="ti ti-chevron-down" id="accordionChevron"></i>
      </button>
      <div class="accordion-body" id="accordionBody" style="display:none">
        <div class="section-title" style="margin-top:0">Font</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:var(--muted)">Font size (mm)</label>
          <input type="number" id="fontSize" value="49" min="20" max="200"
            style="width:64px;height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none"
            onchange="scheduleRender()">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="font-size:12px;color:var(--muted)">Letter spacing (mm)</label>
          <input type="number" id="letterSpacing" value="0" min="-20" max="50" step="0.5"
            style="width:64px;height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none"
            onchange="scheduleRender()">
        </div>
        <div class="section-title" style="margin-top:4px">Layer Settings</div>
        <div id="layerSettings" style="display:flex;flex-direction:column;gap:6px"></div>
        <div class="section-title" style="margin-top:4px">File Name</div>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" id="filePrefix" placeholder="Prefix"
            style="flex:1;height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none"
            oninput="updateFileNamePreview()">
          <span style="font-size:11px;color:var(--muted);flex-shrink:0">NAME</span>
          <input type="text" id="fileSuffix" placeholder="Suffix"
            style="flex:1;height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none"
            oninput="updateFileNamePreview()">
        </div>
        <div style="font-size:10px;color:var(--muted)" id="fileNamePreview"></div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn primary" id="exportBtn" onclick="exportTMF()" style="flex:1">
        <i class="ti ti-download"></i> Export 3MF
      </button>

    </div>
    <div class="status" id="status">Loading font…</div>

    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);font-size:10px;color:rgba(136,136,133,0.4);font-family:ui-monospace,monospace;text-align:center">
      v1.1.6
    </div>

  </div>

  <!-- 3D Preview -->
  <div class="preview" id="previewPane">
    <canvas id="canvas"></canvas>
    <button onclick="resetView()" title="Reset camera"
      style="position:absolute;bottom:212px;right:10px;width:160px;height:28px;
        background:rgba(24,24,27,0.8);border:1px solid var(--border2);border-radius:var(--radius);
        color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;
        justify-content:center;gap:4px;font-family:inherit;transition:color 0.12s"
      onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
      <i class="ti ti-rotate-2"></i> Reset
    </button>
    <canvas id="axesCanvas" style="position:absolute;bottom:40px;right:10px;width:160px;height:160px;pointer-events:none"></canvas>
    <div class="preview-label">Drag to rotate · Scroll to zoom</div>
    <!-- Camera settings panel -->
    <div id="cameraSettingsPanel" style="display:none;position:absolute;top:48px;right:10px;
      background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);
      padding:14px;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:50">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Camera Angle</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:11px;color:var(--muted);width:36px;flex-shrink:0">rotX</label>
          <input type="range" id="camRotX" min="-1.57" max="1.57" step="0.01" value="-0.5"
            style="flex:1;accent-color:var(--accent)" oninput="syncNumFromSlider('camRotX','camRotXNum');applyCameraSettings()">
          <input type="number" id="camRotXNum" value="-0.50" min="-1.57" max="1.57" step="0.01"
            style="width:54px;height:24px;padding:0 4px;font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:ui-monospace,monospace"
            oninput="syncSliderFromNum('camRotX','camRotXNum');applyCameraSettings()">
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:11px;color:var(--muted);width:36px;flex-shrink:0">rotY</label>
          <input type="range" id="camRotY" min="-3.14" max="3.14" step="0.01" value="0.2"
            style="flex:1;accent-color:var(--accent)" oninput="syncNumFromSlider('camRotY','camRotYNum');applyCameraSettings()">
          <input type="number" id="camRotYNum" value="0.20" min="-3.14" max="3.14" step="0.01"
            style="width:54px;height:24px;padding:0 4px;font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:ui-monospace,monospace"
            oninput="syncSliderFromNum('camRotY','camRotYNum');applyCameraSettings()">
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:11px;color:var(--muted);width:36px;flex-shrink:0">Zoom</label>
          <input type="range" id="camZoom" min="0.3" max="4" step="0.05" value="1"
            style="flex:1;accent-color:var(--accent)" oninput="syncNumFromSlider('camZoom','camZoomNum');applyCameraSettings()">
          <input type="number" id="camZoomNum" value="1.00" min="0.3" max="4" step="0.05"
            style="width:54px;height:24px;padding:0 4px;font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:ui-monospace,monospace"
            oninput="syncSliderFromNum('camZoom','camZoomNum');applyCameraSettings()">
        </div>
      </div>
      <button class="btn primary" style="width:100%;height:30px;font-size:11px;margin-top:10px" onclick="saveDefaultAngle()">
        <i class="ti ti-device-floppy"></i> Save as default
      </button>
    </div>
    <div id="angleDisplay" style="position:absolute;bottom:40px;right:178px;font-size:10px;color:var(--muted);background:rgba(0,0,0,0.6);padding:6px 8px;border-radius:4px;font-family:ui-monospace,monospace;line-height:1.8;text-align:right"></div>
    <div style="position:absolute;top:10px;right:10px;display:flex;gap:6px">
      <button class="btn" id="toggleGridBtn" onclick="toggleGrid()" title="Toggle grid" style="height:32px;padding:0 10px;font-size:11px">
        <i class="ti ti-grid-dots"></i> Grid
      </button>
      <button class="btn" id="toggleAxesBtn" onclick="toggleAxes()" title="Toggle orientation cube" style="height:32px;padding:0 10px;font-size:11px">
        <i class="ti ti-cube"></i> Axes
      </button>
      <button class="btn" onclick="toggleCameraSettings()" title="Camera settings" style="height:32px;padding:0 10px;font-size:11px">
        <i class="ti ti-camera-cog"></i>
      </button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/utils/BufferGeometryUtils.js"></script>

<script>

// ── Filament colours ─────────────────────────────────────────
const FILAMENT_COLOURS = [
  {name:'Red',        code:'#FF0000'},
  {name:'Dark Red',   code:'#8B0000'},
  {name:'Yellow',     code:'#F4EE2A'},
  {name:'Orange',     code:'#FF6600'},
  {name:'Black',      code:'#1a1a1a'},
  {name:'White',      code:'#FFFFFF'},
  {name:'Blue',       code:'#0055AA'},
  {name:'Light Blue', code:'#5B9CF6'},
  {name:'Green',      code:'#00AA44'},
  {name:'Light Green',code:'#5CB87A'},
  {name:'Purple',     code:'#7B2FBE'},
  {name:'Pink',       code:'#FF69B4'},
  {name:'Gold',       code:'#E8D5A3'},
  {name:'Silver',     code:'#C0C0C0'},
  {name:'Brown',      code:'#8B4513'},
  {name:'Jade',       code:'#00A86B'},
  {name:'Beige',      code:'#F5F0DC'},
  {name:'Gray',       code:'#808080'},
];

// Layer config
const layerConfig = [
  {id:1, label:'Layer 1', colour:'#FF0000', border:6, thick:3},
  {id:2, label:'Layer 2', colour:'#F4EE2A', border:4, thick:1},
  {id:3, label:'Layer 3', colour:'#1a1a1a', border:2, thick:1},
  {id:4, label:'Layer 4', colour:'#FFFFFF', border:0, thick:1},
];

let openPickerId = null;

function buildLayerUI(){
  // Colour selectors
  const colList = document.getElementById('layerColoursList');
  colList.innerHTML = layerConfig.map(l=>`
    <div class="layer-colour-row">
      <span class="layer-colour-label">${l.label}</span>
      <div class="colour-picker-wrap" id="cpw-${l.id}">
        <div class="colour-picker-btn" onclick="toggleColourPicker(${l.id},this)">
          <div class="cp-swatch" id="cps-${l.id}" style="background:${l.colour}"></div>
          <span class="cp-label" id="cpl-${l.id}">${colourName(l.colour)}</span>
          <i class="ti ti-chevron-down cp-arrow"></i>
        </div>
        <div class="colour-picker-list" id="cplist-${l.id}" style="display:none">
          ${FILAMENT_COLOURS.map(c=>`
            <div class="cp-option" onclick="selectLayerColour(${l.id},'${c.code}','${c.name}')">
              <div class="cp-swatch" style="background:${c.code}"></div>
              <span>${c.name}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`).join('');

  // Layer settings in accordion
  const settingsEl = document.getElementById('layerSettings');
  settingsEl.innerHTML = layerConfig.map(l=>`
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px">
        <div style="width:10px;height:10px;border-radius:2px;background:${l.colour};border:1px solid rgba(255,255,255,0.15)"></div>
        ${l.label}
      </div>
      <div class="layer-setting-row"><label>Border (mm)</label><input type="number" id="b${l.id}" value="${l.border}" min="0" max="20" step="0.5" onchange="layerConfig[${l.id-1}].border=+this.value;scheduleRender()"></div>
      <div class="layer-setting-row" style="margin-top:4px"><label>Thickness (mm)</label><input type="number" id="t${l.id}" value="${l.thick}" min="0.5" max="10" step="0.5" onchange="layerConfig[${l.id-1}].thick=+this.value;scheduleRender()"></div>
    </div>`).join('');

  updateFileNamePreview();
}

function colourName(hex){
  const c = FILAMENT_COLOURS.find(c=>c.code.toLowerCase()===hex.toLowerCase());
  return c ? c.name : hex;
}

function toggleColourPicker(id, btn){
  // Close any open picker
  if(openPickerId && openPickerId !== id){
    document.getElementById('cplist-'+openPickerId).style.display='none';
  }
  const list = document.getElementById('cplist-'+id);
  if(list.style.display !== 'none'){ list.style.display='none'; openPickerId=null; return; }
  // Position
  const rect = btn.getBoundingClientRect();
  list.style.top  = (rect.bottom+4)+'px';
  list.style.left = rect.left+'px';
  list.style.width = rect.width+'px';
  list.style.display='';
  openPickerId = id;
}

function selectLayerColour(id, code, name){
  layerConfig[id-1].colour = code;
  document.getElementById('cps-'+id).style.background = code;
  document.getElementById('cpl-'+id).textContent = name;
  document.getElementById('cplist-'+id).style.display='none';
  openPickerId=null;
  // Update settings swatch
  buildLayerUI();
  scheduleRender();
}

document.addEventListener('click', e=>{
  if(openPickerId && !e.target.closest('.colour-picker-wrap')){
    document.getElementById('cplist-'+openPickerId).style.display='none';
    openPickerId=null;
  }
});

// Accordion
function toggleAccordion(){
  const body = document.getElementById('accordionBody');
  const chev = document.getElementById('accordionChevron');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  chev.style.transform = open ? '' : 'rotate(180deg)';
}

// File name preview
function updateFileNamePreview(){
  const prefix = document.getElementById('filePrefix')?.value||'';
  const suffix = document.getElementById('fileSuffix')?.value||'';
  const name   = document.getElementById('nameInput')?.value||'NAME';
  const parts  = [prefix, name, suffix].filter(Boolean);
  const preview = document.getElementById('fileNamePreview');
  if(preview) preview.textContent = parts.join(' ') + '.3mf';
}
['filePrefix','fileSuffix'].forEach(id=>{
  document.addEventListener('input', e=>{ if(e.target.id===id) updateFileNamePreview(); });
});

// ── State ────────────────────────────────────────────────────
let font = null;
let renderTimer = null;
const FONT_PATH = 'LEGO.TTF';

// Letters with enclosed counters that need hole-filling
const HOLE_LETTERS = new Set('ABDOPQRGbdegopq04689');

// Layer colours
const LAYER_COLOURS = ['#FF0000','#F4EE2A','#000000','#FFFFFF'];

// ── Three.js setup ───────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const pane    = document.getElementById('previewPane');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x18181b);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(0, -100, 200);
camera.lookAt(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, -50, 100);
scene.add(dirLight);

// ── Polygon offset (expand/contract 2D paths) ────────────────
// Simple point-based offset using normal displacement
function offsetPolygon(pts, dist){
  const n = pts.length;
  const result = [];
  for(let i=0; i<n; i++){
    const prev = pts[(i-1+n)%n];
    const curr = pts[i];
    const next = pts[(i+1)%n];
    // Edge vectors
    const e1x=curr.x-prev.x, e1y=curr.y-prev.y;
    const e2x=next.x-curr.x, e2y=next.y-curr.y;
    // Normals (inward for CCW)
    const n1=normalise(-e1y,e1x), n2=normalise(-e2y,e2x);
    // Miter
    const mx=(n1[0]+n2[0])/2, my=(n1[1]+n2[1])/2;
    const mlen=Math.sqrt(mx*mx+my*my)||1;
    const scale=dist/mlen;
    result.push({x:curr.x+mx*scale/mlen*mlen, y:curr.y+my*scale/mlen*mlen});
  }
  return result;
}
function normalise(x,y){ const l=Math.sqrt(x*x+y*y)||1; return[x/l,y/l]; }

// ── Convert opentype path to Three.js ShapePath ──────────────
function opentypePathToShapes(otPath){
  const shapes = [];
  let currentShape = null;
  let currentPath = null;

  for(const cmd of otPath.commands){
    if(cmd.type === 'M'){
      if(currentShape) shapes.push(currentShape);
      currentShape = new THREE.Shape();
      currentShape.moveTo(cmd.x, -cmd.y);
      currentPath = currentShape;
    } else if(cmd.type === 'L'){
      currentPath.lineTo(cmd.x, -cmd.y);
    } else if(cmd.type === 'C'){
      currentPath.bezierCurveTo(cmd.x1,-cmd.y1,cmd.x2,-cmd.y2,cmd.x,-cmd.y);
    } else if(cmd.type === 'Q'){
      currentPath.quadraticCurveTo(cmd.x1,-cmd.y1,cmd.x,-cmd.y);
    } else if(cmd.type === 'Z'){
      currentPath.closePath();
      // Check if this should be a hole
      // Switch to holes mode for subsequent paths in same letter
      if(currentShape && currentShape.curves.length > 0){
        // Start checking for holes
        const holeShape = new THREE.Path();
        currentShape.holes.push(holeShape);
        currentPath = holeShape;
      }
    }
  }
  if(currentShape) shapes.push(currentShape);
  return shapes;
}

// ── Convert a single opentype path to THREE shapes ───────────
function otPathToThreeShapes(otPath, filled){
  const shapePath = new THREE.ShapePath();
  for(const cmd of otPath.commands){
    switch(cmd.type){
      case 'M': shapePath.moveTo(cmd.x, -cmd.y); break;
      case 'L': shapePath.lineTo(cmd.x, -cmd.y); break;
      case 'C': shapePath.bezierCurveTo(cmd.x1,-cmd.y1,cmd.x2,-cmd.y2,cmd.x,-cmd.y); break;
      case 'Q': shapePath.quadraticCurveTo(cmd.x1,-cmd.y1,cmd.x,-cmd.y); break;
      case 'Z': shapePath.currentPath.closePath(); break;
    }
  }
  // LEGO font uses CW winding for outer contours
  // toShapes(false) = CW=outer, CCW=hole — correct for this font
  // For filled (backing) layers: toShapes(false) but ignore holes
  // For white layer: toShapes(false) to get letters with holes correct
  if(filled){
    // Solid fill — get shapes then clear all holes
    const shapes = shapePath.toShapes(false);
    shapes.forEach(s=>{ s.holes = []; });
    return shapes;
  } else {
    // White text — keep holes as-is
    return shapePath.toShapes(false);
  }
}

// ── Get shapes for entire text string ────────────────────────
function getTextShapes(text, fsize, filled){
  // Get one path per glyph — much more reliable than whole-string path
  const glyphs = font.stringToGlyphs(text);
  let x = 0;
  const allShapes = [];
  
  for(let i = 0; i < glyphs.length; i++){
    const glyph = glyphs[i];
    const path = glyph.getPath(x, 0, fsize);
    const shapes = otPathToThreeShapes(path, filled);
    allShapes.push(...shapes);
    // Advance x position
    const adv = glyph.advanceWidth * (fsize / font.unitsPerEm);
    const kern = i < glyphs.length-1 
      ? font.getKerningValue(glyph, glyphs[i+1]) * (fsize / font.unitsPerEm)
      : 0;
    const spacing = parseFloat(document.getElementById('letterSpacing')?.value||0);
    x += adv + kern + spacing;
  }
  return allShapes;
}

// Bounds calculation using per-glyph paths
function getTextContours(text, fsize){
  const glyphs = font.stringToGlyphs(text);
  let x = 0;
  const contours = [];
  for(let i = 0; i < glyphs.length; i++){
    const glyph = glyphs[i];
    const path = glyph.getPath(x, 0, fsize);
    let current = [];
    for(const cmd of path.commands){
      if(cmd.type==='M'){if(current.length)contours.push(current);current=[{x:cmd.x,y:cmd.y}];}
      else if(cmd.type==='L'){current.push({x:cmd.x,y:cmd.y});}
      else if(cmd.type==='C'){const p0=current[current.length-1];for(let t=0.1;t<=1;t+=0.1){const mt=1-t;current.push({x:mt*mt*mt*p0.x+3*mt*mt*t*cmd.x1+3*mt*t*t*cmd.x2+t*t*t*cmd.x,y:mt*mt*mt*p0.y+3*mt*mt*t*cmd.y1+3*mt*t*t*cmd.y2+t*t*t*cmd.y});}}
      else if(cmd.type==='Q'){const p0=current[current.length-1];for(let t=0.1;t<=1;t+=0.1){const mt=1-t;current.push({x:mt*mt*p0.x+2*mt*t*cmd.x1+t*t*cmd.x,y:mt*mt*p0.y+2*mt*t*cmd.y1+t*t*cmd.y});}}
      else if(cmd.type==='Z'){if(current.length)contours.push(current);current=[];}
    }
    if(current.length)contours.push(current);
    const adv = glyph.advanceWidth * (fsize / font.unitsPerEm);
    x += adv;
  }
  return contours;
}

// ── Determine if a contour is a hole (CW winding) ────────────
function isHole(pts){
  let area=0;
  for(let i=0;i<pts.length;i++){
    const j=(i+1)%pts.length;
    area+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;
  }
  return area>0; // CW = hole in font coordinates (Y flipped)
}

// ── Bounding box of contours ──────────────────────────────────
function getBounds(contours){
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const c of contours) for(const p of c){
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y);
  }
  return{minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY};
}

// ── Build filled contour (holes removed) by expanding then contracting ──
function fillContours(contours, fillR){
  // Keep only outer contours, ignore holes
  // Then offset outward by fillR and back — this closes small gaps
  const outers = contours.filter(c=>!isHole(c));
  return outers;
}

// ── Build Three.js shape from contours ───────────────────────
function contoursToShape(contours){
  const outers = contours.filter(c=>!isHole(c));
  const holes  = contours.filter(c=>isHole(c));
  if(!outers.length) return null;

  const shape = new THREE.Shape(outers[0].map(p=>new THREE.Vector2(p.x,-p.y)));
  // Add holes
  for(const hole of holes){
    const path = new THREE.Path(hole.map(p=>new THREE.Vector2(p.x,-p.y)));
    shape.holes.push(path);
  }
  return shape;
}

// ── Build filled shape (no holes) ────────────────────────────
function contoursToFilledShape(contours){
  const outers = contours.filter(c=>!isHole(c));
  if(!outers.length) return null;
  // Merge all outer contours into one shape with no holes
  // Use the largest outer contour
  const largest = outers.reduce((a,b)=>b.length>a.length?b:a, outers[0]);
  return new THREE.Shape(largest.map(p=>new THREE.Vector2(p.x,-p.y)));
}

// ── Build badge mesh ─────────────────────────────────────────
function buildBadge(){
  if(!font){ return; }
  const name = document.getElementById('nameInput').value.toUpperCase()||'NAME';
  const fsize= parseFloat(document.getElementById('fontSize').value)||49;


  // Clear previous
  while(badgeGroup.children.length) badgeGroup.remove(badgeGroup.children[0]);

  // Get text bounds for centering
  const contours = getTextContours(name, fsize);
  if(!contours.length){ setStatus('No geometry — check font.','err'); return; }
  const bounds = getBounds(contours);
  const cx = bounds.minX + bounds.w/2;
  const cy = -(bounds.minY + bounds.h/2);

  let zOff=0;
  const layers = layerConfig.map((l,i)=>{
    const z=zOff; zOff+=l.thick;
    return {border:l.border, thick:l.thick, z, colour:parseInt(l.colour.replace('#',''),16), filled:i<3};
  });

  for(const layer of layers){
    // Get shapes using THREE.ShapePath — handles all letter/hole topology correctly
    const shapes = getTextShapes(name, fsize, layer.filled);
    if(!shapes || !shapes.length) continue;

    // Apply border offset if needed
    let finalShapes = shapes;
    if(layer.border > 0){
      // Rebuild with offset applied to each shape's points
      finalShapes = shapes.map(s=>{
        const pts = s.getPoints(12);
        const offsetPts = offsetContour(pts.map(p=>({x:p.x,y:p.y})), layer.border);
        return new THREE.Shape(offsetPts.map(p=>new THREE.Vector2(p.x,p.y)));
      });
    }

    const extrudeSettings = {depth:layer.thick, bevelEnabled:false, curveSegments:12};
    const geo = new THREE.ExtrudeGeometry(finalShapes, extrudeSettings);
    const mat = new THREE.MeshPhongMaterial({
      color: layer.colour,
      shininess: layer.colour===0xFFFFFF ? 80 : 40,
      polygonOffset: true,
      polygonOffsetFactor: -layer.z,
      polygonOffsetUnits: -1,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(-cx, cy, layer.z);
    badgeGroup.add(mesh);
  }

  // Centre
  const box = new THREE.Box3().setFromObject(badgeGroup);
  const centre = box.getCenter(new THREE.Vector3());
  badgeGroup.position.set(-centre.x, -centre.y, -centre.z);

  setStatus(`Badge ready — ${name} (${bounds.w.toFixed(1)}×${bounds.h.toFixed(1)}mm)`, 'ok');
  document.getElementById('exportBtn').disabled = false;
}

// ── Build offset shapes from contours ────────────────────────
function pointInContour(pt, contour){
  // Ray casting to check if point is inside contour
  let inside = false;
  for(let i=0,j=contour.length-1; i<contour.length; j=i++){
    const xi=contour[i].x, yi=contour[i].y;
    const xj=contour[j].x, yj=contour[j].y;
    if(((yi>pt.y)!==(yj>pt.y))&&(pt.x<(xj-xi)*(pt.y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function contourCentre(c){ 
  return {x:c.reduce((s,p)=>s+p.x,0)/c.length, y:c.reduce((s,p)=>s+p.y,0)/c.length};
}

function buildOffsetShapes(contours, border, fillHoles){
  const outers = contours.filter(c=>!isHole(c));
  const holes  = contours.filter(c=>isHole(c));
  const shapes = [];

  for(const outer of outers){
    let pts = border > 0 ? offsetContour(outer, border) : outer;
    const shape = new THREE.Shape(pts.map(p=>new THREE.Vector2(p.x,-p.y)));

    if(!fillHoles){
      // Only add holes that belong to this outer contour
      const centre = contourCentre(outer);
      for(const hole of holes){
        const hc = contourCentre(hole);
        if(pointInContour(hc, outer)){
          const hpath = new THREE.Path(hole.map(p=>new THREE.Vector2(p.x,-p.y)));
          shape.holes.push(hpath);
        }
      }
    }
    // fillHoles=true: no holes added — solid fill
    shapes.push(shape);
  }
  return shapes;
}

// ── Offset a contour outward by dist ─────────────────────────
function offsetContour(pts, dist){
  const n = pts.length;
  const result = [];
  for(let i=0; i<n; i++){
    const prev = pts[(i-1+n)%n];
    const curr = pts[i];
    const next = pts[(i+1)%n];
    const e1x=curr.x-prev.x, e1y=curr.y-prev.y;
    const e2x=next.x-curr.x, e2y=next.y-curr.y;
    const l1=Math.sqrt(e1x*e1x+e1y*e1y)||1;
    const l2=Math.sqrt(e2x*e2x+e2y*e2y)||1;
    const n1=[-e1y/l1, e1x/l1];
    const n2=[-e2y/l2, e2x/l2];
    const mx=(n1[0]+n2[0]), my=(n1[1]+n2[1]);
    const mlen=Math.sqrt(mx*mx+my*my)||1;
    const dot=n1[0]*n2[0]+n1[1]*n2[1];
    const scale=dist/Math.max(0.5,(mlen/2));
    result.push({x:curr.x+mx/mlen*dist, y:curr.y+my/mlen*dist});
  }
  return result;
}

// ── Export 3MF ───────────────────────────────────────────────
function exportTMF(){

  const fsize= parseFloat(document.getElementById('fontSize').value)||49;


  setStatus('Generating 3MF…');

  const contours = getTextContours(name, fsize);
  let zOff2=0;
  const layers = layerConfig.map((l,i)=>{
    const z=zOff2; zOff2+=l.thick;
    return {border:l.border, thick:l.thick, z, colour:l.colour, name:`layer${i+1}`, extruder:i+1, filled:i<3};
  });

  // Generate mesh for each layer using same approach as preview
  const objects = layers.map((layer, idx) => {
    const shapes = getTextShapes(name, fsize, layer.filled);
    if(!shapes || !shapes.length){ console.warn('No shapes for layer', layer.name); return null; }

    // Apply border offset if needed
    let finalShapes = shapes;
    if(layer.border > 0){
      finalShapes = shapes.map(s=>{
        const pts = s.getPoints(12);
        const offsetPts = offsetContour(pts.map(p=>({x:p.x,y:p.y})), layer.border);
        const ns = new THREE.Shape(offsetPts.map(p=>new THREE.Vector2(p.x,p.y)));
        return ns;
      });
    }

    const extrudeSettings = {depth:layer.thick, bevelEnabled:false, curveSegments:12};
    const geo = new THREE.ExtrudeGeometry(finalShapes, extrudeSettings);
    // Merge duplicate vertices for watertight manifold mesh
    const merged = THREE.BufferGeometryUtils 
      ? THREE.BufferGeometryUtils.mergeVertices(geo)
      : geo;
    merged.computeVertexNormals();
    merged.applyMatrix4(new THREE.Matrix4().makeTranslation(0, 0, layer.z));
    return {geo: merged, ...layer, id:idx+1};
  }).filter(Boolean);

  // Build 3MF XML
  const xml = build3MF(objects, name);

  // Package as zip using JSZip-free approach (simple zip builder)
  const zip = buildZip(xml, name);
  const prefix=(document.getElementById('filePrefix')?.value||'').trim();
  const suffix=(document.getElementById('fileSuffix')?.value||'').trim();
  const parts=[prefix,name,suffix].filter(Boolean);
  const filename=parts.join(' ')+'.3mf';
  downloadBlob(zip, filename, 'application/vnd.ms-package.3dmanufacturing-3dmodel+xml');
  setStatus(`Exported badge_${name}.3mf`, 'ok');
}

function build3MF(objects, name){
  // Build the 3MF model XML with all objects
  let objectsXml = '';
  let components = '';

  objects.forEach(obj => {
    const {geo, id} = obj;
    const pos = geo.attributes.position;
    const idx = geo.index;

    let vertices = '';
    for(let i=0; i<pos.count; i++){
      vertices += `   <vertex x="${pos.getX(i).toFixed(4)}" y="${pos.getY(i).toFixed(4)}" z="${pos.getZ(i).toFixed(4)}"/>\n`;
    }
    let triangles = '';
    if(idx){
      // Indexed geometry — proper shared vertices = watertight mesh
      for(let i=0; i<idx.count; i+=3){
        triangles += `   <triangle v1="${idx.getX(i)}" v2="${idx.getX(i+1)}" v3="${idx.getX(i+2)}"/>\n`;
      }
    } else {
      // Fallback non-indexed
      for(let i=0; i<pos.count; i+=3){
        triangles += `   <triangle v1="${i}" v2="${i+1}" v3="${i+2}"/>\n`;
      }
    }

    objectsXml += `  <object id="${id}" type="model" name="${obj.name}">
   <mesh>
    <vertices>
${vertices}    </vertices>
    <triangles>
${triangles}    </triangles>
   </mesh>
  </object>\n`;

    components += `    <component objectid="${id}" transform="1 0 0 0 1 0 0 0 1 0 0 0"/>\n`;
  });

  // Wrapper object
  const wrapperId = objects.length + 1;
  objectsXml += `  <object id="${wrapperId}" type="model" name="${name}">
   <components>
${components}   </components>
  </object>\n`;

  return `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02">
 <metadata name="Title">${name} Badge</metadata>
 <metadata name="Application">DripDesk Badge Generator</metadata>
 <resources>
${objectsXml} </resources>
 <build>
  <item objectid="${wrapperId}"/>
 </build>
</model>`;
}

// Simple ZIP builder (store only, no compression)
function buildZip(modelXml, name){
  const encoder = new TextEncoder();

  const files = [
    {name:'[Content_Types].xml', data: encoder.encode(`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/></Types>`)},
    {name:'_rels/.rels', data: encoder.encode(`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/></Relationships>`)},
    {name:'3D/3dmodel.model', data: encoder.encode(modelXml)},
  ];

  return createZip(files);
}

function createZip(files){
  const parts = [];
  const centralDir = [];
  let offset = 0;

  for(const file of files){
    const nameBytes = new TextEncoder().encode(file.name);
    const data = file.data;
    const crc = crc32(data);

    // Local file header
    const local = new Uint8Array(30 + nameBytes.length + data.length);
    const dv = new DataView(local.buffer);
    dv.setUint32(0, 0x04034b50, true); // signature
    dv.setUint16(4, 20, true);  // version needed
    dv.setUint16(6, 0, true);   // flags
    dv.setUint16(8, 0, true);   // compression (store)
    dv.setUint16(10, 0, true);  // mod time
    dv.setUint16(12, 0, true);  // mod date
    dv.setUint32(14, crc, true);
    dv.setUint32(18, data.length, true);
    dv.setUint32(22, data.length, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);
    local.set(nameBytes, 30);
    local.set(data, 30 + nameBytes.length);
    parts.push(local);

    // Central directory entry
    const cd = new Uint8Array(46 + nameBytes.length);
    const cdv = new DataView(cd.buffer);
    cdv.setUint32(0, 0x02014b50, true);
    cdv.setUint16(4, 20, true);
    cdv.setUint16(6, 20, true);
    cdv.setUint16(8, 0, true);
    cdv.setUint16(10, 0, true);
    cdv.setUint16(12, 0, true);
    cdv.setUint16(14, 0, true);
    cdv.setUint32(16, crc, true);
    cdv.setUint32(20, data.length, true);
    cdv.setUint32(24, data.length, true);
    cdv.setUint16(28, nameBytes.length, true);
    cdv.setUint16(30, 0, true);
    cdv.setUint16(32, 0, true);
    cdv.setUint16(34, 0, true);
    cdv.setUint16(36, 0, true);
    cdv.setUint32(38, 0, true);
    cdv.setUint32(42, offset, true);
    cd.set(nameBytes, 46);
    centralDir.push(cd);
    offset += local.length;
  }

  const cdSize = centralDir.reduce((s,c)=>s+c.length,0);
  const eocd = new Uint8Array(22);
  const eocddv = new DataView(eocd.buffer);
  eocddv.setUint32(0, 0x06054b50, true);
  eocddv.setUint16(4, 0, true);
  eocddv.setUint16(6, 0, true);
  eocddv.setUint16(8, files.length, true);
  eocddv.setUint16(10, files.length, true);
  eocddv.setUint32(12, cdSize, true);
  eocddv.setUint32(16, offset, true);
  eocddv.setUint16(20, 0, true);

  const total = [...parts, ...centralDir, eocd];
  const result = new Uint8Array(total.reduce((s,p)=>s+p.length,0));
  let pos = 0;
  for(const p of total){ result.set(p, pos); pos+=p.length; }
  return result;
}

function crc32(data){
  let crc = 0xFFFFFFFF;
  for(let i=0; i<data.length; i++){
    crc ^= data[i];
    for(let j=0; j<8; j++) crc = (crc>>>1)^(crc&1?0xEDB88320:0);
  }
  return (crc^0xFFFFFFFF)>>>0;
}

function downloadBlob(data, filename, type){
  const blob = new Blob([data], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Initial state
document.getElementById('exportBtn').disabled = true;
buildLayerUI();
</script>
