<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DripDesk — Badge Generator</title>
<style>
:root{
  --bg:#0f0f10;--surface:#18181b;--surface2:#1f1f23;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8e8e6;--muted:#888885;
  --accent:#e8d5a3;--accent2:#c4a96b;
  --red:#e05c5c;--green:#5cb87a;--amber:#e8a93a;
  --radius:8px;--radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;height:100%;display:flex;flex-direction:column;}

/* ── Login ── */
.login-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:2rem;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;display:flex;flex-direction:column;gap:1.25rem;}
.login-logo{font-size:20px;font-weight:700;color:var(--accent);font-family:ui-monospace,monospace;text-align:center;}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:-12px;}
.login-field{display:flex;flex-direction:column;gap:6px;}
.login-field label{font-size:12px;color:var(--muted);}
.login-field input{height:40px;padding:0 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border-color 0.12s;}
.login-field input:focus{border-color:var(--accent2);}
.login-error{font-size:12px;color:var(--red);display:none;text-align:center;}

/* ── App ── */
.app-screen{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
header{padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.logo{font-family:ui-monospace,monospace;font-size:17px;font-weight:600;color:var(--accent);}
.logo-sep{color:var(--border2);}
.logo-sub{font-size:13px;color:var(--muted);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-chip{font-size:11px;color:var(--muted);padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;}

main{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;min-height:0;}
.panel{padding:1.25rem;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1rem;overflow-y:auto;overflow-x:hidden;min-height:0;height:calc(100vh - 53px);}
.preview{position:relative;background:var(--surface);display:flex;align-items:center;justify-content:center;}
canvas{display:block;}

/* ── Panel elements ── */
.section-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.btn{height:36px;padding:0 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.12s,border-color 0.12s;font-family:inherit;white-space:nowrap;}
.btn:hover{background:var(--surface);border-color:rgba(255,255,255,0.2);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#111;font-weight:600;}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.btn.sm{height:30px;font-size:12px;padding:0 10px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-group{display:flex;gap:6px;}
.status{font-size:11px;color:var(--muted);text-align:center;padding:6px;}
.status.err{color:var(--red);}
.status.ok{color:var(--green);}

/* ── Model selector ── */
.model-select{height:36px;padding:0 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;width:100%;cursor:pointer;}

/* ── Colour picker ── */
.layer-colour-row{display:flex;align-items:center;gap:8px;}
.layer-colour-label{font-size:12px;color:var(--muted);width:52px;flex-shrink:0;}
.colour-picker-wrap{position:relative;flex:1;}
.colour-picker-btn{display:flex;align-items:center;gap:8px;height:30px;padding:0 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text);transition:border-color 0.12s;}
.colour-picker-btn:hover{border-color:rgba(255,255,255,0.25);}
.cp-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);}
.cp-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.colour-picker-list{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);z-index:9999;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5);padding:4px 0;min-width:180px;}
.cp-option{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;font-size:12px;transition:background 0.1s;}
.cp-option:hover{background:var(--surface2);}
.combo-swatches{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.combo-swatch{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,0.15);}

/* ── Accordion ── */
.accordion{border:1px solid var(--border2);border-radius:var(--radius);}
.accordion-btn{width:100%;padding:9px 12px;background:var(--surface2);border:none;color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.12s;}
.accordion-btn:hover{background:var(--surface);}
.accordion-body{padding:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.adv-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.adv-row label{font-size:12px;color:var(--muted);}
.adv-input{width:64px;height:26px;padding:0 6px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;}
.layer-setting-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;}
.layer-setting-header{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.layer-setting-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.layer-setting-row label{font-size:11px;color:var(--muted);}
.layer-setting-row input{width:56px;height:24px;padding:0 6px;font-size:11px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;}

/* ── Preview controls ── */
.preview-controls{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
.preview-label{position:absolute;bottom:12px;left:12px;font-size:10px;color:var(--muted);background:rgba(0,0,0,0.5);padding:3px 8px;border-radius:4px;}
.cam-panel{display:none;position:absolute;top:48px;right:10px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:14px;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:50;}
.cam-panel-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.cam-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.cam-row label{font-size:11px;color:var(--muted);width:40px;flex-shrink:0;}
.cam-row input[type=range]{flex:1;accent-color:var(--accent);}
.cam-row input[type=number]{width:54px;height:24px;padding:0 4px;font-size:11px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;font-family:ui-monospace,monospace;}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<!-- ── Login screen ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">DripDesk</div>
    <div class="login-sub">Badge Generator — sign in to continue</div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn primary" id="loginBtn" onclick="doLogin()" style="width:100%">
      <i class="ti ti-login"></i> Sign in
    </button>
  </div>
</div>

<!-- ── App screen ── -->
<div class="app-screen" id="appScreen">
  <header>
    <span class="logo">DripDesk</span>
    <span class="logo-sep">/</span>
    <span class="logo-sub">Badge Generator</span>
    <div class="header-right">
      <span class="user-chip" id="userChip"></span>
      <button class="btn sm" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </header>

  <main>
    <!-- Panel -->
    <div class="panel">

      <!-- Model selector -->
      <div>
        <div class="section-title">Model</div>
        <select class="model-select" id="modelSelect" onchange="loadModel()">
          <option value="">Loading models…</option>
        </select>
      </div>

      <!-- Name -->
      <div>
        <div class="section-title">Name</div>
        <input type="text" id="nameInput" value="" maxlength="20" placeholder="Enter name…"
          style="height:40px;padding:0 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:18px;font-family:ui-monospace,monospace;font-weight:600;letter-spacing:2px;text-transform:uppercase;outline:none;width:100%"
          oninput="this.value=this.value.toUpperCase();scheduleRender()">
      </div>

      <!-- Backing type -->
      <div>
        <div class="section-title">Backing</div>
        <select id="backingSelect" style="height:36px;padding:0 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;width:100%;cursor:pointer">
          <option value="Magnet">Magnet</option>
          <option value="Pin">Pin</option>
        </select>
      </div>

      <!-- Layer colours -->
      <div>
        <div class="section-title">Layer Colours</div>
        <div class="colour-picker-wrap" id="cpwCombo" style="margin-bottom:8px">
          <div class="colour-picker-btn" onclick="toggleComboList(this)" id="comboBtnDisplay">
            <div style="display:flex;gap:3px;align-items:center" id="comboSwatches"></div>
            <span class="cp-label" id="comboLabel">Loading…</span>
            <i class="ti ti-chevron-down" style="font-size:11px;color:var(--muted);flex-shrink:0"></i>
          </div>
          <div class="colour-picker-list" id="comboList" style="display:none;min-width:260px"></div>
        </div>
        <div id="layerColoursList" style="display:none;flex-direction:column;gap:7px"></div>
      </div>

      <!-- Advanced -->
      <div class="accordion">
        <button class="accordion-btn" onclick="toggleAccordion()">
          <span>Advanced</span>
          <i class="ti ti-chevron-down" id="accordionChevron" style="transition:transform 0.2s"></i>
        </button>
        <div class="accordion-body" id="accordionBody" style="display:none">
          <div class="section-title" style="margin:0">Font</div>
          <div class="adv-row">
            <label>Font size (mm)</label>
            <input type="number" class="adv-input" id="fontSize" value="49" min="10" max="200" onchange="scheduleRender()">
          </div>
          <div class="adv-row">
            <label>Letter spacing (mm)</label>
            <input type="number" class="adv-input" id="letterSpacing" value="0" min="-20" max="50" step="0.5" onchange="scheduleRender()">
          </div>
          <div class="section-title" style="margin-top:4px">Layer Settings</div>
          <div id="layerSettings" style="display:flex;flex-direction:column;gap:6px"></div>
          <div class="section-title" style="margin-top:4px">File Name</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <input type="text" id="filePrefix" placeholder="Prefix"
              style="height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;width:100%"
              oninput="updateFileNamePreview()">
            <input type="text" id="fileSuffix" placeholder="Suffix"
              style="height:28px;padding:0 8px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;width:100%"
              oninput="updateFileNamePreview()">
          </div>
          <div style="font-size:10px;color:var(--muted)" id="fileNamePreview"></div>
          <button class="btn sm" style="width:100%;margin-top:2px" onclick="saveModelSettings()">
            <i class="ti ti-device-floppy"></i> Save model settings
          </button>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn primary" id="exportBtn" onclick="exportTMF()" style="flex:1" disabled>
          <i class="ti ti-download"></i> Export 3MF
        </button>
      </div>
      <div class="status" id="status">Signing in…</div>

      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);font-size:10px;color:rgba(136,136,133,0.4);font-family:ui-monospace,monospace;text-align:center">
        v1.5.4
      </div>
    </div>

    <!-- Preview -->
    <div class="preview" id="previewPane">
      <canvas id="canvas"></canvas>

      <!-- Controls -->
      <div class="preview-controls">
        <button class="btn sm" id="toggleGridBtn" onclick="toggleGrid()"><i class="ti ti-grid-dots"></i> Grid</button>
        <button class="btn sm" onclick="toggleCamPanel('camAnglePanel')"><i class="ti ti-camera-cog"></i></button>
        <button class="btn sm" onclick="toggleCamPanel('camZoomPanel')"><i class="ti ti-zoom-in"></i></button>
      </div>

      <!-- Camera angle panel -->
      <div class="cam-panel" id="camAnglePanel" style="display:none">
        <div class="cam-panel-title">Camera Angle</div>
        <div class="cam-row"><label>rotX</label><input type="range" id="camRotX" min="-1.57" max="1.57" step="0.01" value="-0.5" oninput="syncNum('camRotX','camRotXN');applyCam()"><input type="number" id="camRotXN" value="-0.50" step="0.01" oninput="syncSlider('camRotX','camRotXN');applyCam()"></div>
        <div class="cam-row"><label>rotY</label><input type="range" id="camRotY" min="-3.14" max="3.14" step="0.01" value="0.2" oninput="syncNum('camRotY','camRotYN');applyCam()"><input type="number" id="camRotYN" value="0.20" step="0.01" oninput="syncSlider('camRotY','camRotYN');applyCam()"></div>
        <div class="cam-row"><label>Zoom</label><input type="range" id="camZoom" min="0.3" max="4" step="0.05" value="1" oninput="syncNum('camZoom','camZoomN');applyCam()"><input type="number" id="camZoomN" value="1.00" step="0.05" oninput="syncSlider('camZoom','camZoomN');applyCam()"></div>
        <button class="btn sm primary" style="width:100%;margin-top:8px" onclick="saveDefaultAngle()"><i class="ti ti-device-floppy"></i> Save as default</button>
      </div>

      <!-- Zoom speed panel -->
      <div class="cam-panel" id="camZoomPanel" style="display:none">
        <div class="cam-panel-title">Scroll Zoom Speed</div>
        <div class="cam-row"><label>Speed</label><input type="range" id="zoomSpd" min="0.001" max="0.1" step="0.001" value="0.01" oninput="syncNum('zoomSpd','zoomSpdN');saveZoomSpeed()"><input type="number" id="zoomSpdN" value="0.010" min="0.001" max="0.1" step="0.001" oninput="syncSlider('zoomSpd','zoomSpdN');saveZoomSpeed()"></div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px">Lower = slower. Default: 0.01</div>
      </div>

      <!-- Reset button — top centre -->
      <button onclick="resetView()" title="Reset camera"
        style="position:absolute;top:10px;left:50%;transform:translateX(-50%);"
        class="btn sm">
        <i class="ti ti-rotate-2"></i> Reset Camera
      </button>

      <div class="preview-label">Drag to rotate · Scroll to zoom</div>

      <!-- Step viewer -->
      <div id="stepViewer" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
        display:flex;align-items:center;gap:8px;background:rgba(24,24,27,0.85);
        border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;min-width:300px">
        <button onclick="stepChange(-1)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;line-height:1" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">&#8592;</button>
        <input type="range" id="stepSlider" min="0" max="7" step="1" value="7"
          style="flex:1;accent-color:var(--accent)" oninput="showStep(+this.value)">
        <button onclick="stepChange(1)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;line-height:1" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">&#8594;</button>
        <span id="stepLabel" style="font-size:11px;color:var(--muted);white-space:nowrap;min-width:160px;text-align:center;font-family:ui-monospace,monospace"></span>
      </div>
    </div>
  </main>
</div>

<script src="config.js" onerror="console.warn('config.js missing')"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/utils/BufferGeometryUtils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script>
// ── Supabase config ───────────────────────────────────────────
const SB_URL = (window.CONFIG && window.CONFIG.SUPABASE_URL) || '';
const SB_KEY = (window.CONFIG && window.CONFIG.SUPABASE_KEY) || '';
let sbToken = null;
let currentUser = null;

function sbHeaders(){ return {'apikey':SB_KEY,'Authorization':'Bearer '+(sbToken||SB_KEY),'Content-Type':'application/json','Prefer':'return=representation'}; }
async function sbGet(table,q=''){ const r=await fetch(`${SB_URL}/rest/v1/${table}${q}`,{headers:sbHeaders()}); return r.json(); }
async function sbUpsert(table,row){ const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...sbHeaders(),'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(row)}); return r.json(); }

// ── Auth ──────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Signing in…';
  try{
    const res=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const data=await res.json();
    if(data.error){ throw new Error(data.error_description||data.error); }
    sbToken=data.access_token;
    currentUser=data.user;
    localStorage.setItem('badge_token',sbToken);
    showApp();
  }catch(e){
    errEl.textContent=e.message; errEl.style.display='block';
    btn.disabled=false; btn.innerHTML='<i class="ti ti-login"></i> Sign in';
  }
}

async function restoreSession(){
  const t=localStorage.getItem('badge_token');
  if(!t) return false;
  try{
    const res=await fetch(`${SB_URL}/auth/v1/user`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+t}});
    if(!res.ok) return false;
    sbToken=t; currentUser=await res.json(); return true;
  }catch(e){ return false; }
}

function doLogout(){
  localStorage.removeItem('badge_token');
  sbToken=null; currentUser=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

async function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  document.getElementById('userChip').textContent=currentUser?.user_metadata?.display_name||currentUser?.email||'';
  await loadColours();
  await loadModels();
}

// ── Data ──────────────────────────────────────────────────────
let colours = [];
let models   = [];
let currentModel = null;
let layerConfig  = [];
let font = null;

async function loadColours(){
  colours = await sbGet('colours','?available=eq.true&order=id');
}

async function loadModels(){
  models = await sbGet('badge_models','?archived=eq.false&order=name');
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = models.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  if(models.length) await loadModel();
}

async function loadModel(){
  const id = document.getElementById('modelSelect').value;
  currentModel = models.find(m=>m.id===id);
  if(!currentModel) return;

  // Load layers
  const layers = await sbGet('badge_model_layers',`?model_id=eq.${id}&order=layer_order`);
  const settings = await sbGet('badge_model_settings',`?model_id=eq.${id}`);
  const prefs = await sbGet('badge_user_preferences',`?model_id=eq.${id}&user_id=eq.${currentUser.id}`);

  // Build layerConfig
  layerConfig = layers.map((l,i)=>({
    id: l.id,
    model_id: l.model_id,
    order: l.layer_order,
    colourHex: l.colour_hex,
    colourId: l.colour_id,
    border: l.border_mm,
    thick: l.thickness_mm,
    filled: l.filled,
  }));

  // Apply settings
  const s = settings[0]||{};
  document.getElementById('fontSize').value = currentModel.font_size||49;
  document.getElementById('letterSpacing').value = s.letter_spacing||0;
  document.getElementById('filePrefix').value = s.file_prefix||'';
  document.getElementById('fileSuffix').value = s.file_suffix||'';

  // Apply user prefs
  const p = prefs[0]||{};
  defRotX = parseFloat(p.def_rot_x??-0.5);
  defRotY = parseFloat(p.def_rot_y??0.2);
  defZoom = parseFloat(p.def_zoom??1);

async function loadPreviousCombos(){
  // Fetch orders that have colour options for current model's category
  // Get all complete orders with options containing colour data
  try {
    const orders = await sbGet('orders', '?select=options&status=eq.Complete&options=not.is.null&order=id.desc&limit=200');
    const seen = new Set();
    previousCombos = [];
    for(const o of orders){
      if(!o.options) continue;
      // Extract colour values from options
      const parts = o.options.split('||');
      const colourParts = parts.filter(p=>{
        const name = p.split(':')[0]?.toLowerCase()||'';
        return name.includes('colour') || name.includes('color');
      });
      if(!colourParts.length) continue;
      // Get the colour values (pipe-separated colour names)
      const colourValues = colourParts.map(p=>p.split(':').slice(1).join(':').trim());
      // Each value is like "Red|Yellow|Black|White" — split by pipe
      const colourNames = colourValues[0]?.split('|').map(s=>s.trim()).filter(Boolean)||[];
      if(colourNames.length !== layerConfig.length) continue;
      const key = colourNames.join('|');
      if(seen.has(key)) continue;
      seen.add(key);
      // Map colour names to hex codes
      const hexCodes = colourNames.map(name=>{
        const c = colours.find(c=>c.name.toLowerCase()===name.toLowerCase());
        return {name, hex: c?.code||'#888888', id: c?.id||null};
      });
      previousCombos.push({key, colours: hexCodes});
      if(previousCombos.length >= 20) break;
    }
  } catch(e){ console.warn('Could not load combos:', e); }
  buildComboList();
}

// ── Font / shape rendering ────────────────────────────────────
let renderTimer=null;
function scheduleRender(){clearTimeout(renderTimer);renderTimer=setTimeout(buildBadge,300);}

function otPathToShapes(otPath,filled){
  const sp=new THREE.ShapePath();
  for(const cmd of otPath.commands){
    switch(cmd.type){
      case 'M':sp.moveTo(cmd.x,-cmd.y);break;
      case 'L':sp.lineTo(cmd.x,-cmd.y);break;
      case 'C':sp.bezierCurveTo(cmd.x1,-cmd.y1,cmd.x2,-cmd.y2,cmd.x,-cmd.y);break;
      case 'Q':sp.quadraticCurveTo(cmd.x1,-cmd.y1,cmd.x,-cmd.y);break;
      case 'Z':sp.currentPath.closePath();break;
    }
  }
  if(filled){const s=sp.toShapes(false);s.forEach(sh=>{sh.holes=[];});return s;}
  return sp.toShapes(false);
}

function getTextShapes(text,fsize,filled){
  const glyphs=font.stringToGlyphs(text);
  const spacing=parseFloat(document.getElementById('letterSpacing')?.value||0);
  let x=0;

  if(filled){
    // Combine ALL glyphs into one ShapePath, then get points for offset
    const combinedPath=new THREE.ShapePath();
    for(let i=0;i<glyphs.length;i++){
      const g=glyphs[i];
      const path=g.getPath(x,0,fsize);
      for(const cmd of path.commands){
        switch(cmd.type){
          case 'M':combinedPath.moveTo(cmd.x,-cmd.y);break;
          case 'L':combinedPath.lineTo(cmd.x,-cmd.y);break;
          case 'C':combinedPath.bezierCurveTo(cmd.x1,-cmd.y1,cmd.x2,-cmd.y2,cmd.x,-cmd.y);break;
          case 'Q':combinedPath.quadraticCurveTo(cmd.x1,-cmd.y1,cmd.x,-cmd.y);break;
          case 'Z':combinedPath.currentPath.closePath();break;
        }
      }
      const adv=g.advanceWidth*(fsize/font.unitsPerEm);
      const kern=i<glyphs.length-1?font.getKerningValue(g,glyphs[i+1])*(fsize/font.unitsPerEm):0;
      x+=adv+kern+spacing;
    }
    const shapes=combinedPath.toShapes(false);
    shapes.forEach(s=>{s.holes=[];});
    return shapes;
  }

  // White text layer: per-glyph to preserve holes correctly
  const all=[];
  for(let i=0;i<glyphs.length;i++){
    const g=glyphs[i];
    const path=g.getPath(x,0,fsize);
    all.push(...otPathToShapes(path,false));
    const adv=g.advanceWidth*(fsize/font.unitsPerEm);
    const kern=i<glyphs.length-1?font.getKerningValue(g,glyphs[i+1])*(fsize/font.unitsPerEm):0;
    x+=adv+kern+spacing;
  }
  return all;
}

function getTextContours(text,fsize){
  const glyphs=font.stringToGlyphs(text); let x=0; const contours=[];
  for(let i=0;i<glyphs.length;i++){
    const path=glyphs[i].getPath(x,0,fsize); let cur=[];
    for(const cmd of path.commands){
      if(cmd.type==='M'){if(cur.length)contours.push(cur);cur=[{x:cmd.x,y:cmd.y}];}
      else if(cmd.type==='L')cur.push({x:cmd.x,y:cmd.y});
      else if(cmd.type==='C'){const p0=cur[cur.length-1];for(let t=0.1;t<=1;t+=0.1){const m=1-t;cur.push({x:m*m*m*p0.x+3*m*m*t*cmd.x1+3*m*t*t*cmd.x2+t*t*t*cmd.x,y:m*m*m*p0.y+3*m*m*t*cmd.y1+3*m*t*t*cmd.y2+t*t*t*cmd.y});}}
      else if(cmd.type==='Q'){const p0=cur[cur.length-1];for(let t=0.1;t<=1;t+=0.1){const m=1-t;cur.push({x:m*m*p0.x+2*m*t*cmd.x1+t*t*cmd.x,y:m*m*p0.y+2*m*t*cmd.y1+t*t*cmd.y});}}
      else if(cmd.type==='Z'){if(cur.length)contours.push(cur);cur=[];}
    }
    if(cur.length)contours.push(cur);
    x+=glyphs[i].advanceWidth*(fsize/font.unitsPerEm);
  }
  return contours;
}

function getBounds(contours){let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;for(const c of contours)for(const p of c){minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);}return{minX,maxX,minY,maxY,w:maxX-minX,h:maxY-minY};}

// Returns the area of a THREE.Shape (shoelace formula)
function shapeArea(shape){
  const pts = shape.getPoints(12);
  let area = 0;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    area += (pts[j].x+pts[i].x)*(pts[j].y-pts[i].y);
  }
  return Math.abs(area/2);
}

// Point-in-polygon test for a THREE.Shape
function pointInShape(px, py, shape){
  const pts = shape.getPoints(12);
  let inside = false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function shapeCentre(shape){
  const pts = shape.getPoints(8);
  return {x:pts.reduce((s,p)=>s+p.x,0)/pts.length, y:pts.reduce((s,p)=>s+p.y,0)/pts.length};
}

// Remove shapes whose centre is inside a larger shape (they are holes/enclosed areas)
function removeEnclosed(shapes){
  if(shapes.length<=1) return shapes;
  // Sort largest first
  const sorted = [...shapes].sort((a,b)=>shapeArea(b)-shapeArea(a));
  return sorted.filter((s,i)=>{
    const c = shapeCentre(s);
    // Check if this shape's centre is inside any larger shape
    for(let j=0;j<i;j++){
      if(pointInShape(c.x, c.y, sorted[j])) return false;
    }
    return true;
  });
}

function offsetContour(pts,dist){const n=pts.length,r=[];for(let i=0;i<n;i++){const prev=pts[(i-1+n)%n],curr=pts[i],next=pts[(i+1)%n];const e1x=curr.x-prev.x,e1y=curr.y-prev.y;const e2x=next.x-curr.x,e2y=next.y-curr.y;const l1=Math.sqrt(e1x*e1x+e1y*e1y)||1,l2=Math.sqrt(e2x*e2x+e2y*e2y)||1;const n1=[-e1y/l1,e1x/l1],n2=[-e2y/l2,e2x/l2];const mx=n1[0]+n2[0],my=n1[1]+n2[1],mlen=Math.sqrt(mx*mx+my*my)||1;r.push({x:curr.x+mx/mlen*dist,y:curr.y+my/mlen*dist});}return r;}

function buildBadge(){
  if(!font||!layerConfig.length) return;
  const name=document.getElementById('nameInput').value.toUpperCase()||'NAME';
  const fsize=parseFloat(document.getElementById('fontSize').value)||49;
  // Remove all children except the grid
  badgeGroup.children.filter(c=>c!==grid).forEach(c=>badgeGroup.remove(c));
  const contours=getTextContours(name,fsize);
  if(!contours.length) return;
  const bounds=getBounds(contours);
  // Use fixed text-based centre — never changes with border or spacing
  const cx=bounds.minX+bounds.w/2;
  const cy=-(bounds.minY+bounds.h/2);
  const totalThick=layerConfig.reduce((s,l)=>s+l.thick,0);
  let zOff=0; let layerIdx=0;
  for(const l of layerConfig){
    if(debugBlackOnly && layerIdx !== 2){ zOff+=l.thick; layerIdx++; continue; }
    const shapes=getTextShapes(name,fsize,l.filled);
    if(!shapes.length){zOff+=l.thick;continue;}
    let finalShapes=shapes;
    if(l.filled){
      // Expand by this layer's border, then merge all shapes into one unified outline
      // This closes gaps between letters at this border size
      const expanded = shapes.map(s=>{
        const pts = s.getPoints(24);
        return offsetContour(pts.map(p=>({x:p.x,y:p.y})), l.border > 0 ? l.border : 0.1);
      });
      const mergePath = new THREE.ShapePath();
      expanded.forEach(pts=>{
        if(!pts.length) return;
        mergePath.moveTo(pts[0].x, pts[0].y);
        pts.slice(1).forEach(p=>mergePath.lineTo(p.x, p.y));
        mergePath.currentPath.closePath();
      });
      const merged = mergePath.toShapes(false);
      merged.forEach(s=>{ s.holes=[]; });
      // Remove any enclosed shapes (holes, gaps) — keep only outer outlines
      finalShapes = removeEnclosed(merged);
    } else if(l.border > 0){
      finalShapes = shapes.map(s=>{ const pts=s.getPoints(12); const op=offsetContour(pts.map(p=>({x:p.x,y:p.y})),l.border); return new THREE.Shape(op.map(p=>new THREE.Vector2(p.x,p.y))); });
    }
    const geo=new THREE.ExtrudeGeometry(finalShapes,{depth:l.thick,bevelEnabled:false,curveSegments:24});
    const mat=new THREE.MeshPhongMaterial({color:parseInt(l.colourHex.replace('#',''),16),shininess:20});
    const mesh=new THREE.Mesh(geo,mat);
    // Centre X/Y on text bounds, centre Z on total stack height
    mesh.position.set(-cx, cy, zOff + layerIdx * 0.01);
    badgeGroup.add(mesh);
    zOff+=l.thick; layerIdx++;
  }
  // No dynamic recentring — position is stable
  setStatus(`${name} — ${bounds.w.toFixed(1)}×${bounds.h.toFixed(1)}mm`,'ok');
}

// ── Export 3MF ────────────────────────────────────────────────
function exportTMF(){
  if(!font) return;
  const name=document.getElementById('nameInput').value.toUpperCase()||'NAME';
  const fsize=parseFloat(document.getElementById('fontSize').value)||49;
  setStatus('Generating 3MF…');
  const contours=getTextContours(name,fsize);
  let zOff=0;
  const objects=layerConfig.map((l,idx)=>{
    const shapes=getTextShapes(name,fsize,l.filled);
    let finalShapes=shapes;
    if(l.border>0 && l.filled){
      // For filled backing layers: expand each shape outward by border amount
      // Use a larger expand-then-contract to merge gaps between close letters
      finalShapes=shapes.map(s=>{
        const pts=s.getPoints(24);
        const op=offsetContour(pts.map(p=>({x:p.x,y:p.y})),l.border);
        return new THREE.Shape(op.map(p=>new THREE.Vector2(p.x,p.y)));
      });
    } else if(l.border>0){
      finalShapes=shapes.map(s=>{const pts=s.getPoints(12);const op=offsetContour(pts.map(p=>({x:p.x,y:p.y})),l.border);return new THREE.Shape(op.map(p=>new THREE.Vector2(p.x,p.y)));});
    }
    const geo=new THREE.ExtrudeGeometry(finalShapes,{depth:l.thick,bevelEnabled:false,curveSegments:24});
    const merged=THREE.BufferGeometryUtils?THREE.BufferGeometryUtils.mergeVertices(geo):geo;
    merged.computeVertexNormals();
    merged.applyMatrix4(new THREE.Matrix4().makeTranslation(0,0,zOff2));
    zOff+=l.thick;
    return{geo:merged,name:`layer${idx+1}`,colour:l.colourHex,id:idx+1};
  }).filter(o=>o.geo.attributes.position.count>0);

  const xml=build3MF(objects,name);
  const zip=buildZip(xml);
  const prefix=(document.getElementById('filePrefix')?.value||'').trim();
  const suffix=(document.getElementById('fileSuffix')?.value||'').trim();
  const filename=[prefix,name,suffix].filter(Boolean).join(' ')+'.3mf';
  downloadBlob(zip,filename,'application/vnd.ms-package.3dmanufacturing-3dmodel+xml');
  setStatus(`Exported ${filename}`,'ok');
}

function build3MF(objects,name){
  let objXml='',comps='';
  objects.forEach(obj=>{
    const pos=obj.geo.attributes.position,idx=obj.geo.index;
    let verts='',tris='';
    for(let i=0;i<pos.count;i++) verts+=`   <vertex x="${pos.getX(i).toFixed(4)}" y="${pos.getY(i).toFixed(4)}" z="${pos.getZ(i).toFixed(4)}"/>\n`;
    if(idx){for(let i=0;i<idx.count;i+=3)tris+=`   <triangle v1="${idx.getX(i)}" v2="${idx.getX(i+1)}" v3="${idx.getX(i+2)}"/>\n`;}
    else{for(let i=0;i<pos.count;i+=3)tris+=`   <triangle v1="${i}" v2="${i+1}" v3="${i+2}"/>\n`;}
    objXml+=`  <object id="${obj.id}" type="model" name="${obj.name}">\n   <mesh>\n    <vertices>\n${verts}    </vertices>\n    <triangles>\n${tris}    </triangles>\n   </mesh>\n  </object>\n`;
    comps+=`    <component objectid="${obj.id}" transform="1 0 0 0 1 0 0 0 1 0 0 0"/>\n`;
  });
  const wId=objects.length+1;
  objXml+=`  <object id="${wId}" type="model" name="${name}">\n   <components>\n${comps}   </components>\n  </object>\n`;
  return`<?xml version="1.0" encoding="UTF-8"?>\n<model unit="millimeter" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02">\n <metadata name="Title">${name} Badge</metadata>\n <resources>\n${objXml} </resources>\n <build>\n  <item objectid="${wId}"/>\n </build>\n</model>`;
}

function buildZip(xml){
  const enc=new TextEncoder();
  const files=[
    {name:'[Content_Types].xml',data:enc.encode(`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/></Types>`)},
    {name:'_rels/.rels',data:enc.encode(`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/></Relationships>`)},
    {name:'3D/3dmodel.model',data:enc.encode(xml)},
  ];
  const parts=[],cd=[];let off=0;
  for(const f of files){
    const nb=enc.encode(f.name),d=f.data,crc=crc32(d);
    const loc=new Uint8Array(30+nb.length+d.length),dv=new DataView(loc.buffer);
    dv.setUint32(0,0x04034b50,true);dv.setUint16(4,20,true);dv.setUint16(6,0,true);dv.setUint16(8,0,true);dv.setUint16(10,0,true);dv.setUint16(12,0,true);dv.setUint32(14,crc,true);dv.setUint32(18,d.length,true);dv.setUint32(22,d.length,true);dv.setUint16(26,nb.length,true);dv.setUint16(28,0,true);
    loc.set(nb,30);loc.set(d,30+nb.length);parts.push(loc);
    const ce=new Uint8Array(46+nb.length),cv=new DataView(ce.buffer);
    cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);cv.setUint16(8,0,true);cv.setUint16(10,0,true);cv.setUint16(12,0,true);cv.setUint16(14,0,true);cv.setUint32(16,crc,true);cv.setUint32(20,d.length,true);cv.setUint32(24,d.length,true);cv.setUint16(28,nb.length,true);cv.setUint16(30,0,true);cv.setUint16(32,0,true);cv.setUint16(34,0,true);cv.setUint16(36,0,true);cv.setUint32(38,0,true);cv.setUint32(42,off,true);
    ce.set(nb,46);cd.push(ce);off+=loc.length;
  }
  const cdSize=cd.reduce((s,c)=>s+c.length,0);
  const eocd=new Uint8Array(22),ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(4,0,true);ev.setUint16(6,0,true);ev.setUint16(8,files.length,true);ev.setUint16(10,files.length,true);ev.setUint32(12,cdSize,true);ev.setUint32(16,off,true);ev.setUint16(20,0,true);
  const all=[...parts,...cd,eocd];const res=new Uint8Array(all.reduce((s,p)=>s+p.length,0));let p=0;for(const a of all){res.set(a,p);p+=a.length;}return res;
}

function crc32(data){let c=0xFFFFFFFF;for(let i=0;i<data.length;i++){c^=data[i];for(let j=0;j<8;j++)c=(c>>>1)^(c&1?0xEDB88320:0);}return(c^0xFFFFFFFF)>>>0;}
function downloadBlob(data,filename,type){const b=new Blob([data],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=filename;a.click();URL.revokeObjectURL(u);}


// ── Step viewer ───────────────────────────────────────────────
let stepData = [];
let debugBlackOnly = true; // Show only black layer for debugging
let currentStep = 4;

const STEP_LABELS = [
  'Step 1: Raw glyph outlines (per letter)',
  'Step 2: All glyphs combined into one path',
  'Step 3: toShapes() result (before offset)',
  'Step 4: Expanded by black border (2mm)',
  'Step 5: After ShapePath merge',
  'Step 6: After removeEnclosed',
  'Step 7: Black layer extruded',
  'Step 8: All layers final',
];

function stepChange(dir){
  const slider = document.getElementById('stepSlider');
  const next = Math.max(0, Math.min(4, currentStep + dir));
  slider.value = next;
  showStep(next);
}

function showStep(n){
  currentStep = n;
  document.getElementById('stepLabel').textContent = STEP_LABELS[n]||'';
  if(!font || !layerConfig.length) return;

  const name = document.getElementById('nameInput').value.toUpperCase()||'NAME';
  const fsize = parseFloat(document.getElementById('fontSize').value)||49;
  const spacing = parseFloat(document.getElementById('letterSpacing')?.value||0);

  badgeGroup.children.filter(c=>c!==grid).forEach(c=>badgeGroup.remove(c));

  if(n === 7){ buildBadge(); return; }

  // Focus on black layer (index 2)
  const blackLayer = layerConfig[2];
  const border = blackLayer ? blackLayer.border : 2;
  const colour = blackLayer ? parseInt(blackLayer.colourHex.replace('#',''),16) : 0x333333;
  const glyphs = font.stringToGlyphs(name);

  function addWire(pts, z, col){
    if(!pts || !pts.length) return;
    const geo = new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(p.x||p.x,p.y||p.y,z)));
    const idx = [...Array(pts.length).keys()]; idx.push(0);
    geo.setIndex(idx);
    badgeGroup.add(new THREE.LineLoop(geo, new THREE.LineBasicMaterial({color:col})));
  }

  function addSolid(shape, z, thick, col){
    const geo = new THREE.ExtrudeGeometry([shape], {depth:thick,bevelEnabled:false,curveSegments:24});
    const mat = new THREE.MeshPhongMaterial({color:col,shininess:20});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.z = z;
    badgeGroup.add(mesh);
  }

  // Build combined path helper
  function buildCombinedPath(){
    const cp = new THREE.ShapePath(); let px=0;
    for(let i=0;i<glyphs.length;i++){
      const g=glyphs[i]; const path=g.getPath(px,0,fsize);
      for(const cmd of path.commands){
        switch(cmd.type){
          case 'M':cp.moveTo(cmd.x,-cmd.y);break;
          case 'L':cp.lineTo(cmd.x,-cmd.y);break;
          case 'C':cp.bezierCurveTo(cmd.x1,-cmd.y1,cmd.x2,-cmd.y2,cmd.x,-cmd.y);break;
          case 'Q':cp.quadraticCurveTo(cmd.x1,-cmd.y1,cmd.x,-cmd.y);break;
          case 'Z':cp.currentPath.closePath();break;
        }
      }
      px+=g.advanceWidth*(fsize/font.unitsPerEm)+spacing;
    }
    return cp;
  }

  if(n === 0){
    // Raw per-glyph outlines
    let px=0;
    for(let i=0;i<glyphs.length;i++){
      const path=glyphs[i].getPath(px,0,fsize);
      const shapes=otPathToShapes(path,false);
      shapes.forEach(s=>addWire(s.getPoints(24).map(p=>({x:p.x,y:p.y})),0,0x5b9cf6));
      px+=glyphs[i].advanceWidth*(fsize/font.unitsPerEm)+spacing;
    }
  } else if(n === 1){
    // Combined into one ShapePath
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach((s,i)=>addWire(s.getPoints(24).map(p=>({x:p.x,y:p.y})),0,[0xe05c5c,0xf4ee2a,0x5b9cf6,0xffffff][i%4]));
  } else if(n === 2){
    // toShapes result, holes cleared
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach(s=>{ s.holes=[]; });
    shapes.forEach((s,i)=>addWire(s.getPoints(24).map(p=>({x:p.x,y:p.y})),0,[0xe05c5c,0xf4ee2a,0x5b9cf6,0xffffff][i%4]));
  } else if(n === 3){
    // Each shape expanded by black border
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach(s=>{ s.holes=[]; });
    const expanded = shapes.map(s=>{
      const pts=s.getPoints(24);
      return offsetContour(pts.map(p=>({x:p.x,y:p.y})), border>0?border:0.1);
    });
    expanded.forEach((pts,i)=>addWire(pts,i*3,colour));
  } else if(n === 4){
    // After ShapePath merge
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach(s=>{ s.holes=[]; });
    const expanded = shapes.map(s=>offsetContour(s.getPoints(24).map(p=>({x:p.x,y:p.y})),border>0?border:0.1));
    const mergePath=new THREE.ShapePath();
    expanded.forEach(pts=>{ if(!pts.length)return; mergePath.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>mergePath.lineTo(p.x,p.y)); mergePath.currentPath.closePath(); });
    const merged=mergePath.toShapes(false);
    merged.forEach(s=>{ s.holes=[]; });
    merged.forEach((s,i)=>addWire(s.getPoints(24).map(p=>({x:p.x,y:p.y})),i*3,colour));
  } else if(n === 5){
    // After removeEnclosed
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach(s=>{ s.holes=[]; });
    const expanded = shapes.map(s=>offsetContour(s.getPoints(24).map(p=>({x:p.x,y:p.y})),border>0?border:0.1));
    const mergePath=new THREE.ShapePath();
    expanded.forEach(pts=>{ if(!pts.length)return; mergePath.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>mergePath.lineTo(p.x,p.y)); mergePath.currentPath.closePath(); });
    const merged=mergePath.toShapes(false);
    merged.forEach(s=>{ s.holes=[]; });
    const clean=removeEnclosed(merged);
    clean.forEach((s,i)=>addWire(s.getPoints(24).map(p=>({x:p.x,y:p.y})),i*3,colour));
  } else if(n === 6){
    // Black layer extruded solid
    const shapes = buildCombinedPath().toShapes(false);
    shapes.forEach(s=>{ s.holes=[]; });
    const expanded = shapes.map(s=>offsetContour(s.getPoints(24).map(p=>({x:p.x,y:p.y})),border>0?border:0.1));
    const mergePath=new THREE.ShapePath();
    expanded.forEach(pts=>{ if(!pts.length)return; mergePath.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>mergePath.lineTo(p.x,p.y)); mergePath.currentPath.closePath(); });
    const merged=mergePath.toShapes(false);
    merged.forEach(s=>{ s.holes=[]; });
    const clean=removeEnclosed(merged);
    clean.forEach(s=>addSolid(s, 0, 1, colour));
  }

  const bounds = getBounds(getTextContours(name,fsize));
  const cx=bounds.minX+bounds.w/2, cy=-(bounds.minY+bounds.h/2);
  badgeGroup.position.set(-cx, cy, 0);
}

// Init step viewer label
document.addEventListener('DOMContentLoaded',()=>{
  const sl=document.getElementById('stepSlider');
  if(sl){ sl.max=7; sl.value=7; document.getElementById('stepLabel').textContent=STEP_LABELS[7]; }
});

(async()=>{
  const ok=await restoreSession();
  if(ok) showApp();
})();
</script>
