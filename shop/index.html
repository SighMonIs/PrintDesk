<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintDesk Shop</title>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="shop.css?v=19">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body class="shop-body">

<header class="shop-header">
  <a href="/" class="shop-logo">PrintDesk</a>
  <div class="shop-header-right">
    <span class="account-chip" id="accountChip"><i class="ti ti-user"></i> Sign in</span>
    <button class="cart-btn" onclick="toggleCartDrawer()">
      <i class="ti ti-shopping-cart"></i>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<main class="shop-main">

  <!-- Top half — 3D preview -->
  <section class="shop-preview-half">
    <div class="preview" id="previewPane">
      <canvas id="canvas"></canvas>
      <div class="style-quick-picks" id="styleQuickPicks">
        <button class="btn style-quick-btn" data-style="Name Badge" onclick="selectStyleByName('Name Badge')">Name Badge</button>
        <button class="btn style-quick-btn" data-style="Keychain" onclick="selectStyleByName('Keychain')">Keychain</button>
      </div>
      <div class="preview-label">Drag to rotate · Scroll to zoom</div>

      <!-- Staff only: set the site-wide default view for this product type.
           The toggle button must live inside .preview-controls — render.js's
           outside-click handler exempts that class so the same click that
           opens the panel doesn't immediately close it again. -->
      <div class="preview-controls">
        <button class="btn sm cam-toggle-btn" id="camControlsToggle" style="display:none" onclick="toggleCamPanel('camAnglePanel')"><i class="ti ti-camera-cog"></i> Adjust view</button>
      </div>
      <div class="cam-panel" id="camAnglePanel" style="display:none">
        <div class="cam-panel-title">Default camera angle (staff only)</div>
        <div class="cam-row"><label>rotX</label><input type="range" id="camRotX" min="-1.57" max="1.57" step="0.01" value="-0.4" oninput="syncNum('camRotX','camRotXN');applyCam()"><input type="number" id="camRotXN" value="-0.40" step="0.01" oninput="syncSlider('camRotX','camRotXN');applyCam()"></div>
        <div class="cam-row"><label>rotY</label><input type="range" id="camRotY" min="-3.14" max="3.14" step="0.01" value="0.2" oninput="syncNum('camRotY','camRotYN');applyCam()"><input type="number" id="camRotYN" value="0.20" step="0.01" oninput="syncSlider('camRotY','camRotYN');applyCam()"></div>
        <div class="cam-row"><label>Zoom</label><input type="range" id="camZoom" min="0.3" max="4" step="0.05" value="1" oninput="syncNum('camZoom','camZoomN');applyCam()"><input type="number" id="camZoomN" value="1.00" step="0.05" oninput="syncSlider('camZoom','camZoomN');applyCam()"></div>
        <button class="btn sm primary" id="saveViewBtn" style="width:100%;margin-top:8px" onclick="saveShopDefaultView()"><i class="ti ti-device-floppy"></i> Save as default</button>
      </div>
      <!-- render.js's toggleCamPanel() addresses 3 panel ids unconditionally;
           these two aren't used in the shop but must exist so it doesn't throw. -->
      <div id="camZoomPanel" style="display:none"></div>
      <div id="viewportPanel" style="display:none"></div>
    </div>
    <div class="no-preview" id="noPreview" style="display:none">
      <i class="ti ti-photo"></i>
      <p>This is a custom order — we'll follow up with a preview before printing.</p>
    </div>
  </section>

  <!-- Straddles the preview/form boundary on purpose — half in each half. -->
  <div class="shop-field name-row" id="nameFieldWrap">
    <input type="text" id="nameInput" class="shop-field-input shop-field-input-lg" placeholder="Your Name">
  </div>

  <!-- Bottom half — order form -->
  <section class="shop-form-half">
    <div class="shop-form-inner">
      <div class="shop-field" id="backingFieldWrap" style="display:none">
        <label class="shop-field-label">Backing</label>
        <select id="backingInline" class="shop-field-input"></select>
      </div>

      <div class="shop-field">
        <label class="shop-field-label">Colours</label>
        <div class="layer-colours" id="layerColoursList"></div>
      </div>

      <div id="optionFields"></div>

      <div class="qty-price-row">
        <div class="shop-field qty-field">
          <label class="shop-field-label">Qty</label>
          <div class="qty-stepper">
            <button class="spin-btn" onclick="stepQty(-1)" type="button">−</button>
            <input type="number" id="qtyInput" value="1" min="1" onchange="updatePriceDisplay()">
            <button class="spin-btn" onclick="stepQty(1)" type="button">+</button>
          </div>
        </div>
        <div class="shop-field price-field">
          <label class="shop-field-label">Price Each</label>
          <div class="price-value" id="unitPrice">$0.00</div>
        </div>
        <div class="shop-field price-field">
          <label class="shop-field-label">Total</label>
          <div class="price-value price-value-accent" id="lineTotal">$0.00</div>
        </div>
      </div>

      <button class="btn primary add-to-cart-btn" onclick="addToCart()"><i class="ti ti-shopping-cart-plus"></i> Add to cart</button>
    </div>
  </section>
</main>

<!-- Cart drawer -->
<div class="cart-drawer-backdrop" id="cartDrawerBackdrop" onclick="closeCartDrawer()"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header">
    <button class="btn sm continue-shopping-btn" onclick="closeCartDrawer()"><i class="ti ti-arrow-left"></i> Continue Shopping</button>
    <span>Your cart</span>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-drawer-footer">
    <div class="cart-total-row"><span>Total</span><strong id="cartTotal">$0.00</strong></div>
    <button class="btn primary" style="width:100%" onclick="checkout()"><i class="ti ti-lock"></i> Checkout</button>
    <div class="checkout-note" id="checkoutNote"></div>
  </div>
</aside>

<!-- Auth modal -->
<div class="auth-modal-backdrop" id="authModal" style="display:none" onclick="if(event.target===this)closeAuthModal()">
  <div class="auth-modal">
    <div class="auth-modal-header">
      <span id="authTitle">Sign in</span>
      <button class="icon-btn" onclick="closeAuthModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="auth-field" id="authNameRow" style="display:none">
      <label>Name</label>
      <input type="text" id="authName" placeholder="Your name">
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="auth-error" id="authError" style="display:none"></div>
    <button class="btn primary" id="authSubmitBtn" style="width:100%" onclick="doCustomerLogin()">Sign in</button>
    <div class="auth-switch" id="authSwitchText">New here? <a href="#" onclick="openAuthModal('signup');return false">Create an account</a></div>
  </div>
</div>

<!-- Colour picker modal -->
<div class="auth-modal-backdrop" id="colourModal" style="display:none" onclick="if(event.target===this)closeColourModal()">
  <div class="auth-modal colour-modal">
    <div class="auth-modal-header">
      <span id="colourModalTitle">Choose a colour</span>
      <button class="icon-btn" onclick="closeColourModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="colour-modal-grid" id="colourModalGrid"></div>
  </div>
</div>

<!-- Elements the copied render engine (data.js/render.js) reads directly but
     the shop UI doesn't expose — kept present so those lookups don't throw. -->
<div style="display:none" aria-hidden="true">
  <select id="modelSelect"></select>
  <input id="fontSize" type="number" value="49">
  <input id="letterSpacing" type="number" value="0">
  <input id="wordSpacing" type="number" value="0">
  <div id="status"></div>
</div>

<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="data.js?v=19"></script>
<script src="3mf.js?v=19"></script>
<script src="render.js?v=19"></script>
<script src="auth.js?v=19"></script>
<script src="shop.js?v=19"></script>
</body>
</html>
