<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge Generator 2</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="controls">
  <input type="text" id="nameInput" value="NAME" maxlength="20"
    oninput="this.value=this.value.toUpperCase();scheduleRender()">
  <div class="slider-row">
    <label>Border</label>
    <input type="range" id="borderRange" min="0" max="40" value="10"
      oninput="document.getElementById('borderVal').textContent=this.value;scheduleRender()">
    <span id="borderVal">10</span>px
  </div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="render.js"></script>
</body>
</html>
