<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge Generator 2</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="panel">
  <div class="section-title">Name</div>
  <input type="text" id="nameInput" value="NAME" maxlength="20" class="name-input"
    oninput="this.value=this.value.toUpperCase();scheduleRender()">

  <div class="section-title" style="margin-top:20px">Layers</div>
  <div id="layerList" class="layer-list"></div>
</div>

<div id="previewPane">
  <canvas id="canvas"></canvas>
  <div class="hint">Drag to rotate · Scroll to zoom</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script src="render.js"></script>
</body>
</html>
